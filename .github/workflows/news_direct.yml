name: 財經新聞推播

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python main.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GROQ_KEY:           ${{ secrets.GROQ_KEY }}
          OPENROUTER_KEY:     ${{ secrets.OPENROUTER_KEY }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          FINNHUB_KEY:        ${{ secrets.FINNHUB_KEY }}
          ALPHAVANTAGE_KEY:   ${{ secrets.ALPHAVANTAGE_KEY }}
          MARKETAUX_KEY:      ${{ secrets.MARKETAUX_KEY }}
          CURRENTS_KEY:       ${{ secrets.CURRENTS_KEY }}
          FRED_KEY:           ${{ secrets.FRED_KEY }}
      - name: 儲存已發送紀錄
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sent_links.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update sent links [skip ci]"
          git push
